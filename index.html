function fmtD(str){if(!str)return"";const t=str.trim(),low=t.toLowerCase().replace(/\s+/g," ").trim();if(["present","current","now","ongoing"].includes(low))return"Present";const m1=low.match(/^([a-z]+)\s*(\d{4})$/);if(m1&&MM[m1[1]])return MM[m1[1]]+" "+m1[2];const m2=low.match(/^(\d{1,2})[\/\-](\d{4})$/);if(m2&&MM[m2[1]])return MM[m2[1]]+" "+m2[2];const m3=low.match(/^(\d{4})[\/\-](\d{1,2})$/);if(m3&&MM[m3[2]])return MM[m3[2]]+" "+m3[1];if(/^\d{4}$/.test(low))return t;return t.charAt(0).toUpperCase()+t.slice(1);}
function fmtR(s,e,cur){const a=fmtD(s),b=cur?"Present":fmtD(e);if(!a&&!b)return"";if(!a)return b;if(!b)return a;return`${a} \u2013 ${b}`;}
const LW=new Set(["of","the","a","an","in","at","on","and","or","for","with","to","by","from","&"]);

  const filt=catOps.filter(o=>o.toLowerCase().includes(q.toLowerCase())&&!selected.includes(o)).slice(0,10);
  const canAdd=q.trim().length>0&&!options.some(o=>o.toLowerCase()===q.trim().toLowerCase())&&!selected.includes(q.trim());
  const total=filt.length+(canAdd?1:0);
  const add=v=>{const t=v.trim();if(t&&!selected.includes(t))onChange([...selected,t]);setQ("");setHov(-1);if(ref.current)ref.current.focus();};
  const rm=v=>onChange(selected.filter(s=>s!==v));
  const onKD=e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();if(hov>=0&&hov<filt.length)add(filt[hov]);else if(hov===filt.length&&canAdd)add(q);else if(q.trim())add(q);}else if(e.key==="Backspace"&&!q&&selected.length>0)rm(selected[selected.length-1]);else if(e.key==="ArrowDown"){e.preventDefault();setHov(h=>Math.min(h+1,total-1));}else if(e.key==="ArrowUp"){e.preventDefault();setHov(h=>Math.max(h-1,-1));}else if(e.key==="Escape")setOpen(false);};
  const catNames=cats?Object.keys(cats):[];
  return(
    <div style={{position:"relative"}}>
      {/* Category filter pills */}
      {cats&&(
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {["All",...catNames].map(c=>(
            <button key={c} onClick={()=>{setCat(c);setQ("");}} style={{padding:"3px 10px",borderRadius:20,border:"1px solid "+(cat===c?accent:"#1e293b"),background:cat===c?accent+"22":"transparent",color:cat===c?accent:"#475569",fontSize:10,cursor:"pointer",fontFamily:"system-ui",fontWeight:cat===c?700:400,whiteSpace:"nowrap",transition:"all .12s"}}>
              {c==="All"?"🌐 All Industries":c}
            </button>))}
        </div>)}
      <div onClick={()=>{setOpen(true);if(ref.current)ref.current.focus();}} style={{minHeight:46,padding:"6px 10px 4px",background:"#0f172a",border:"1px solid "+(open?"#f59e0b":"#1e293b"),borderRadius:8,cursor:"text",display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",transition:"border-color .15s"}}>
        {selected.map(s=><span key={s} style={{background:chipBg,color:chipColor,borderRadius:6,padding:"3px 7px 3px 10px",fontSize:12,fontFamily:"system-ui",display:"flex",alignItems:"center",gap:3,fontWeight:500}}>{s}<span onMouseDown={e=>{e.preventDefault();e.stopPropagation();rm(s);}} style={{cursor:"pointer",fontSize:15,lineHeight:1,opacity:.72,marginLeft:1}}>×</span></span>)}
        <input ref={ref} value={q} onChange={e=>{setQ(e.target.value);setOpen(true);setHov(-1);}} onKeyDown={onKD} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>{setOpen(false);setHov(-1);},180)} placeholder={selected.length===0?placeholder:"Type to search or add more\u2026"} style={{background:"transparent",border:"none",outline:"none",color:"#e2e8f0",fontSize:13,fontFamily:"system-ui",flex:1,minWidth:140,padding:"3px 4px"}}/>
      </div>
      {open&&(filt.length>0||canAdd)&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#1e293b",border:"1px solid #334155",borderRadius:10,maxHeight:240,overflowY:"auto",zIndex:300,boxShadow:"0 12px 32px rgba(0,0,0,.55)"}}>
          {filt.length===0&&<div style={{padding:"10px 14px",fontSize:12,color:"#475569",fontFamily:"system-ui"}}>No matches — press Enter to add custom</div>}
          {filt.map((o,i)=><div key={o} onMouseDown={()=>add(o)} onMouseEnter={()=>setHov(i)} style={{padding:"9px 14px",fontSize:13,fontFamily:"system-ui",color:hov===i?"#fff":"#cbd5e1",cursor:"pointer",background:hov===i?accent:"transparent",borderBottom:"1px solid rgba(255,255,255,.04)",transition:"background .08s"}}>{o}</div>)}
          {canAdd&&<div onMouseDown={()=>add(q)} onMouseEnter={()=>setHov(filt.length)} style={{padding:"9px 14px",fontSize:13,fontFamily:"system-ui",color:hov===filt.length?"#fff":"#f59e0b",cursor:"pointer",background:hov===filt.length?"#92400e":"rgba(245,158,11,.08)",fontStyle:"italic",borderTop:"1px solid rgba(255,255,255,.06)"}}>+ Add "{q.trim()}"</div>}
        </div>)}
      {selected.length>0&&<div style={{marginTop:5,fontSize:11,color:"#334155",fontFamily:"system-ui"}}>{selected.length} selected · Backspace removes last</div>}
    </div>);
}

    const sw=Math.round(W*.33), isL=t.layout==="sidebar-left";

    <button onClick={onClick} style={{padding:"4px 12px",borderRadius:20,border:"1px solid "+(active?"#f59e0b":"#1e293b"),background:active?"#f59e0b":"transparent",color:active?"#0a0700":"#64748b",fontSize:11,cursor:"pointer",fontFamily:"system-ui",fontWeight:active?700:400,whiteSpace:"nowrap",transition:"all .12s"}}>{label}</button>);

  return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      {/* Header */}
      <div style={{background:"rgba(0,0,0,.35)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"14px 28px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(14px)"}}>
        <div style={{width:36,height:36,background:"#f59e0b",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#0a0700",flexShrink:0}}>✶</div>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:"#f8fafc",fontFamily:"system-ui"}}>ResumeAI Pro</div>
          <div style={{fontSize:11,color:"#475569",fontFamily:"system-ui"}}>AI-Powered Resume Builder</div>
        </div>
        <div style={{display:"flex",gap:6,marginLeft:12}}>
          <span style={{background:"#0f3d21",color:"#4ade80",borderRadius:12,padding:"2px 9px",fontSize:10,fontFamily:"system-ui",fontWeight:700}}>2 FREE</span>
          <span style={{background:"#1e3a8a",color:"#93c5fd",borderRadius:12,padding:"2px 9px",fontSize:10,fontFamily:"system-ui",fontWeight:700}}>15 PRO</span>
        </div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search templates…" style={{marginLeft:"auto",padding:"7px 14px",background:"#111827",border:"1px solid #1e293b",borderRadius:8,color:"#e2e8f0",fontSize:13,fontFamily:"system-ui",width:210,outline:"none"}}/>
      </div>
      {/* Filters */}
      <div style={{padding:"16px 28px 0",display:"flex",gap:7,flexWrap:"wrap"}}>
        {CATS.map(c=><Pill key={c} label={c} active={cat===c} onClick={()=>setCat(c)}/>)}
        <span style={{fontSize:11,color:"#334155",fontFamily:"system-ui",alignSelf:"center",marginLeft:4}}>{list.length} templates</span>
      </div>
      {/* Grid */}
      <div style={{padding:"18px 28px 60px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:14}}>
        {list.map(t=>{
          const locked=t.isPremium&&!isPremium;
          return(
          <div key={t.id} onMouseEnter={()=>setHov(t.id)} onMouseLeave={()=>setHov(null)} onClick={()=>handlePick(t)}
            style={{background:hov===t.id?"#1e293b":"#111827",borderRadius:12,border:`1px solid ${hov===t.id?locked?"#f59e0b":"#f59e0b":"rgba(255,255,255,.06)"}`,cursor:"pointer",overflow:"hidden",transform:hov===t.id?"translateY(-3px)":"none",boxShadow:hov===t.id?"0 14px 36px rgba(0,0,0,.55)":"0 2px 8px rgba(0,0,0,.3)",transition:"all .18s"}}>
            {/* Thumbnail */}
            <div style={{background:t.bg,lineHeight:0,position:"relative"}}>
              <ThumbSVG t={t}/>
              {locked&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.28)",display:"flex",alignItems:"center",justifyContent:"center",transition:"opacity .2s",opacity:hov===t.id?1:.4}}>
                <div style={{textAlign:"center",transform:"translateY(-4px)"}}>
                  <div style={{fontSize:22}}>&#128081;</div>
                  <div style={{fontSize:9,color:"#f59e0b",fontFamily:"system-ui",fontWeight:700,letterSpacing:1}}>PRO</div>
                </div>
              </div>}
            </div>
            {/* Info */}
            <div style={{padding:"10px 10px 11px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui"}}>{t.name}</span>
                <span style={{fontSize:9,borderRadius:4,padding:"1px 6px",fontFamily:"system-ui",fontWeight:700,background:t.isPremium?"#1e3a8a":"#0f3d21",color:t.isPremium?"#93c5fd":"#4ade80"}}>{t.tag}</span>
              </div>
              <div style={{fontSize:10,color:"#475569",fontFamily:"system-ui",marginBottom:7,lineHeight:1.4}}>{t.tagline}</div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                {t.cats.slice(0,2).map(c=><span key={c} style={{fontSize:9,padding:"1px 5px",background:"#0f172a",color:"#64748b",borderRadius:4,fontFamily:"system-ui"}}>{c}</span>)}
              </div>
            </div>
            {hov===t.id&&<div style={{background:locked?"linear-gradient(90deg,#f59e0b,#d97706)":"#f59e0b",textAlign:"center",padding:"8px",fontSize:11,fontWeight:700,color:"#0a0700",fontFamily:"system-ui"}}>
              {locked?"👑 Unlock Template →":"Use This Template →"}
            </div>}
          </div>);})}
      </div>
    </div>
  );
}

/* =====================================================================
   RESUME VIEW  —  config-driven renderer for all 17 templates
===================================================================== */
function ResumeView({tmpl,personal,exps,edus,skills,aiData,photo,portfolio,rRef}){
  if(!tmpl||!aiData)return null;
  const t=tmpl, F="Calibri,'Segoe UI',Arial,sans-serif";
  const name=(personal.name||"YOUR NAME");
  const displayName=t.caps?name.toUpperCase():name;
  const tStr=Array.isArray(skills.tech)?skills.tech.join("  ·  "):"";
  const soStr=Array.isArray(skills.soft)?skills.soft.join("  ·  "):"";
  const laStr=Array.isArray(skills.langs)?skills.langs.join("  ·  "):"";

  /* Section header */
  const SH=({title})=>{
    const s=t.ss, c=t.sc, a=t.ac, p=t.primary;
    if(s==="underline"||s==="underline-warm"||s==="gold-ul")
      return <div style={{fontSize:"8.5pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2.5px",color:c,borderBottom:`1.8px solid ${s==="gold-ul"?a:c}`,paddingBottom:3,marginBottom:10,marginTop:16,fontFamily:F}}>{title}</div>;
    if(s==="leftbar"||s==="leftbar-green")
      return <div style={{borderLeft:`3px solid ${a}`,paddingLeft:8,color:c,fontSize:"10pt",fontWeight:700,marginTop:14,marginBottom:8,fontFamily:F}}>{title}</div>;
    if(s==="band")
      return <div style={{background:c,color:"#fff",padding:"3px 8px",fontSize:"8pt",letterSpacing:"2px",textTransform:"uppercase",marginTop:14,marginBottom:8,fontFamily:F}}>{title}</div>;
    if(s==="band-amber")
      return <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,marginBottom:8}}>
        <div style={{height:2,background:a,flex:1}}/><div style={{fontSize:"8pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:c,whiteSpace:"nowrap",fontFamily:F}}>{title}</div><div style={{height:2,background:a,flex:1}}/></div>;
    if(s==="caps")
      return <div style={{fontSize:"8.5pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"3px",color:c,marginTop:16,marginBottom:8,opacity:.8,fontFamily:F}}>{title}</div>;
    if(s==="dot-dash")
      return <div style={{display:"flex",alignItems:"center",gap:7,marginTop:14,marginBottom:8}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:a,flexShrink:0}}/><div style={{fontSize:"8.5pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:c,fontFamily:F}}>{title}</div><div style={{flex:1,height:1,background:c,opacity:.25}}/></div>;
    if(s==="pill")
      return <div style={{marginTop:14,marginBottom:8}}><span style={{background:a,color:"#fff",borderRadius:4,padding:"2px 10px",fontSize:"9pt",letterSpacing:"1px",display:"inline-block",fontFamily:F}}>{title}</span></div>;
    if(s==="hairline")
      return <div style={{fontSize:"8pt",fontWeight:300,textTransform:"uppercase",letterSpacing:"3.5px",color:c,borderBottom:".5px solid "+c,paddingBottom:4,marginTop:18,marginBottom:10,opacity:.65,fontFamily:F}}>{title}</div>;
    if(s==="line-above")
      return <div style={{marginTop:16,marginBottom:8}}><div style={{height:1.5,background:p,opacity:.7,marginBottom:4}}/><div style={{fontSize:"8.5pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:c,fontFamily:F}}>{title}</div></div>;
    if(s==="gold-ornament")
      return <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,marginBottom:8}}>
        <div style={{flex:1,height:1,background:a,opacity:.5}}/><div style={{fontSize:"8.5pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:c,fontFamily:F,whiteSpace:"nowrap"}}>{"✷"} {title} {"✷"}</div><div style={{flex:1,height:1,background:a,opacity:.5}}/></div>;
    return <div style={{borderBottom:`1px solid ${c}`,paddingBottom:3,color:c,fontSize:"8.5pt",textTransform:"uppercase",letterSpacing:"2px",marginTop:16,marginBottom:8,fontFamily:F}}>{title}</div>;
  };

  const ExpList=()=>exps.map((exp,i)=>!(exp.company||exp.title)?null:(
    <div key={exp.id} style={{marginBottom:12}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}><tbody><tr>
        <td style={{fontWeight:700,fontSize:"11pt",color:t.primary,fontFamily:F}}>{toTC(exp.title)}</td>
        <td style={{textAlign:"right",fontSize:"9pt",color:"#666",whiteSpace:"nowrap",paddingLeft:8,fontStyle:"italic",fontFamily:F}}>{fmtR(exp.start,exp.end,exp.current)}</td>
      </tr></tbody></table>
      {exp.company&&<div style={{fontSize:"10.5pt",color:t.ac,fontWeight:600,fontStyle:"italic",marginBottom:3,fontFamily:F}}>{toTC(exp.company)}</div>}
      <ul style={{margin:0,paddingLeft:17}}>{(aiData.experience?.[i]?.bullets||[]).map((b,j)=><li key={j} style={{fontSize:"10.5pt",lineHeight:1.62,marginBottom:2,color:t.tx,fontFamily:F}}>{b}</li>)}</ul>
    </div>));

  const EduList=()=>edus.map(edu=>!edu.school?null:(
    <div key={edu.id} style={{marginBottom:8}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}><tbody><tr>
        <td style={{fontWeight:700,fontSize:"11pt",color:t.primary,fontFamily:F}}>{toTC(edu.school)}</td>
        <td style={{textAlign:"right",fontSize:"9pt",color:"#666",whiteSpace:"nowrap",paddingLeft:8,fontStyle:"italic",fontFamily:F}}>{fmtR(edu.start,edu.end,false)}</td>
      </tr></tbody></table>
      <div style={{fontSize:"10.5pt",color:t.tx,marginTop:1,fontFamily:F}}>{[toTC(edu.degree),toTC(edu.field)].filter(Boolean).join(", ")}{edu.gpa&&<span style={{color:"#666"}}> · GPA: {edu.gpa}</span>}</div>
    </div>));

  const SkillTbl=()=>(
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"10.5pt"}}>
      {tStr&&<tr><td style={{fontWeight:700,width:105,paddingBottom:4,verticalAlign:"top",color:t.primary,paddingRight:8,fontFamily:F}}>Technical</td><td style={{paddingBottom:4,color:t.tx,lineHeight:1.65,fontFamily:F}}>{tStr}</td></tr>}
      {soStr&&<tr><td style={{fontWeight:700,paddingBottom:4,verticalAlign:"top",color:t.primary,paddingRight:8,fontFamily:F}}>Soft Skills</td><td style={{paddingBottom:4,color:t.tx,lineHeight:1.65,fontFamily:F}}>{soStr}</td></tr>}
      {laStr&&<tr><td style={{fontWeight:700,paddingBottom:4,verticalAlign:"top",color:t.primary,paddingRight:8,fontFamily:F}}>Languages</td><td style={{paddingBottom:4,color:t.tx,lineHeight:1.65,fontFamily:F}}>{laStr}</td></tr>}
      {skills.certs&&<tr><td style={{fontWeight:700,paddingBottom:4,verticalAlign:"top",color:t.primary,paddingRight:8,fontFamily:F}}>Certifications</td><td style={{paddingBottom:4,color:t.tx,lineHeight:1.75,whiteSpace:"pre-line",fontFamily:F}}>{skills.certs}</td></tr>}
    </table>);

  const PortSection=()=>portfolio.length>0?(
    <>{SH({title:"Portfolio Highlights"})}
      {portfolio.some(p=>p.isImage)&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:6}}>
        {portfolio.filter(p=>p.isImage).slice(0,6).map(p=><div key={p.id} style={{borderRadius:4,overflow:"hidden",border:"1px solid #e5e7eb"}}>
          <img src={p.data} style={{width:"100%",height:76,objectFit:"cover",display:"block"}} alt={p.name}/>
          <div style={{fontSize:"7pt",color:"#888",padding:"2px 4px",fontFamily:F,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{p.name}</div>
        </div>)}
      </div>}
      {portfolio.filter(p=>!p.isImage).map(p=><div key={p.id} style={{fontSize:"10pt",color:t.primary,fontFamily:F,marginBottom:2}}>{"📎"} {p.name}</div>)}
    </>):null;

  /* Sidebar inner content */
  const SideContent=()=>(
    <div>
      {photo&&<div style={{textAlign:"center",marginBottom:16}}><img src={photo} alt="" style={{width:82,height:82,borderRadius:"50%",objectFit:"cover",border:"3px solid rgba(255,255,255,.35)"}}/></div>}
      {[
        {lbl:"Contact",items:[personal.email,personal.phone,personal.location].filter(Boolean)
          .map(v=>({v,c:"rgba(255,255,255,.82)"})).concat([personal.linkedin,personal.website]
          .filter(Boolean).map(v=>({v,c:t.ac||"#93c5fd"})))},
        skills.tech.length>0&&{lbl:"Skills",items:[...skills.tech.slice(0,12)].map(v=>({v:"• "+v,c:"rgba(255,255,255,.78)"}))},
        skills.langs.length>0&&{lbl:"Languages",items:skills.langs.map(v=>({v,c:"rgba(255,255,255,.82)"}))},
        edus.some(e=>e.school)&&{lbl:"Education",items:edus.filter(e=>e.school).map(e=>({edu:e}))},
      ].filter(Boolean).map((sec,si)=>(
        <div key={si} style={{marginBottom:14}}>
          <div style={{fontSize:"8pt",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",color:t.sbSc||"rgba(255,255,255,.55)",borderBottom:"1px solid rgba(255,255,255,.16)",paddingBottom:3,marginBottom:7,fontFamily:F}}>{sec.lbl}</div>
          {sec.items.map((item,ii)=>item.edu
            ?<div key={ii} style={{marginBottom:8}}>
               <div style={{fontSize:"9.5pt",fontWeight:700,color:"rgba(255,255,255,.9)",fontFamily:F}}>{toTC(item.edu.school)}</div>
               <div style={{fontSize:"9pt",color:"rgba(255,255,255,.65)",fontFamily:F}}>{[toTC(item.edu.degree),toTC(item.edu.field)].filter(Boolean).join(", ")}</div>
               <div style={{fontSize:"8.5pt",color:"rgba(255,255,255,.45)",fontFamily:F}}>{fmtR(item.edu.start,item.edu.end,false)}</div>
             </div>
            :<div key={ii} style={{fontSize:"9pt",color:item.c,marginBottom:3,fontFamily:F,wordBreak:"break-all"}}>{item.v}</div>
          )}
        </div>))}
    </div>);

  /* Header variants */
  const nameStyle={fontSize:`${t.ns||22}pt`,fontWeight:t.nw||700,color:t.nc,letterSpacing:t.nls||"1.5px",lineHeight:1.1,marginBottom:4,fontFamily:F};
  const roleStyle={fontSize:"11pt",color:t.ac,fontWeight:600,marginBottom:6,fontFamily:F};
  const contactStyle=(dark)=>({fontSize:"9pt",color:dark?"rgba(255,255,255,.8)":"#555",display:"flex",flexWrap:"wrap",gap:"0 13px",lineHeight:2,fontFamily:F});
  const photoEl=(dark)=>photo?<img src={photo} alt="" style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:`2.5px solid ${dark?"rgba(255,255,255,.42)":t.primary}`,marginLeft:16,flexShrink:0}}/>:null;

  const MainContent=(withEdu=true)=>(
    <>
      {aiData.summary&&<>{SH({title:"Professional Summary"})}<p style={{fontSize:"10.5pt",lineHeight:1.7,color:t.tx,margin:0,fontFamily:F}}>{aiData.summary}</p></>}
      {exps.some(e=>e.company||e.title)&&<>{SH({title:"Professional Experience"})}<ExpList/></>}
      {withEdu&&edus.some(e=>e.school)&&<>{SH({title:"Education"})}<EduList/></>}
      {(tStr||soStr||skills.certs||laStr)&&<>{SH({title:"Skills & Qualifications"})}<SkillTbl/></>}
      <PortSection/>
    </>);

  /* ── SIDEBAR LAYOUTS ── */
  if(t.layout==="sidebar-left"||t.layout==="sidebar-right"){
    const isL=t.layout==="sidebar-left";
    const sideEl=<div style={{width:t.sbW||200,background:t.sbBg,padding:"38px 18px",flexShrink:0}}><SideContent/></div>;
    const mainEl=<div style={{flex:1,padding:t.pd||"36px 34px",background:t.bg}}>
      <div style={{...nameStyle,color:t.nc}}>{displayName}</div>
      {personal.role&&<div style={roleStyle}>{toTC(personal.role)}</div>}
      <hr style={{border:"none",borderTop:`1.8px solid ${t.primary}`,margin:"4px 0 4px",opacity:.65}}/>
      <MainContent withEdu={false}/>
    </div>;
    return <div ref={rRef} style={{display:"flex",background:t.bg,minHeight:800}}>{isL?sideEl:mainEl}{isL?mainEl:sideEl}</div>;
  }

  /* ── HEADER BAND ── */
  if(t.layout==="header-band"){
    return(<div ref={rRef} style={{background:t.bg}}>
      <div style={{background:t.hBg||t.primary,padding:t.hPad||"30px 46px",position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{...nameStyle,color:t.nc}}>{displayName}</div>
            {personal.role&&<div style={{...roleStyle,color:t.ac}}>{toTC(personal.role)}</div>}
            <div style={contactStyle(true)}>
              {personal.email&&<span>{personal.email}</span>}{personal.phone&&<span>{personal.phone}</span>}
              {personal.location&&<span>{personal.location}</span>}
              {personal.linkedin&&<span style={{color:t.ac}}>{personal.linkedin}</span>}
              {personal.website&&<span style={{color:t.ac}}>{personal.website}</span>}
            </div>
          </div>
          {photoEl(true)}
        </div>
      </div>
      <div style={{padding:t.pd||"26px 46px"}}><MainContent withEdu={true}/></div>
    </div>);
  }

  /* ── ACCENT BAR ── */
  if(t.layout==="accent-bar"){
    return(<div ref={rRef} style={{display:"flex",background:t.bg}}>
      <div style={{width:t.acBarW||6,background:t.acBarC||t.primary,flexShrink:0}}/>
      <div style={{flex:1,padding:t.pd||"44px 52px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{flex:1}}>
            <div style={{...nameStyle}}>{displayName}</div>
            {personal.role&&<div style={roleStyle}>{toTC(personal.role)}</div>}
            <div style={contactStyle(false)}>
              {personal.email&&<span>{personal.email}</span>}{personal.phone&&<span>{personal.phone}</span>}
              {personal.location&&<span>{personal.location}</span>}
              {personal.linkedin&&<span style={{color:t.ac}}>{personal.linkedin}</span>}
              {personal.website&&<span style={{color:t.ac}}>{personal.website}</span>}
            </div>
          </div>
          {photoEl(false)}
        </div>
        <hr style={{border:"none",borderTop:`1.2px solid ${t.primary}`,margin:"4px 0 0",opacity:.38}}/>
        <MainContent withEdu={true}/>
      </div>
    </div>);
  }

  /* ── SINGLE COLUMN (default) ── */
  const centered=t.hs==="centered"||t.hs==="centered-editorial";
  return(<div ref={rRef} style={{padding:t.pd||"44px 56px",background:t.bg}}>
    {centered
      ?<div style={{textAlign:"center",marginBottom:8}}>
          <div style={{...nameStyle,textAlign:"center"}}>{displayName}</div>
          {personal.role&&<div style={{...roleStyle,textAlign:"center"}}>{toTC(personal.role)}</div>}
          {t.hs==="centered-editorial"&&<div style={{height:2,background:t.ac,width:60,margin:"8px auto 8px"}}/>}
          <div style={{...contactStyle(false),justifyContent:"center"}}>
            {personal.email&&<span>{personal.email}</span>}{personal.phone&&<span>{personal.phone}</span>}
            {personal.location&&<span>{personal.location}</span>}
            {personal.linkedin&&<span style={{color:t.ac}}>{personal.linkedin}</span>}
            {personal.website&&<span style={{color:t.ac}}>{personal.website}</span>}
          </div>
         </div>
      :<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{flex:1}}>
            <div style={nameStyle}>{displayName}</div>
            {personal.role&&<div style={roleStyle}>{toTC(personal.role)}</div>}
            <div style={contactStyle(false)}>
              {personal.email&&<span>{personal.email}</span>}{personal.phone&&<span>{personal.phone}</span>}
              {personal.location&&<span>{personal.location}</span>}
              {personal.linkedin&&<span style={{color:t.ac}}>{personal.linkedin}</span>}
              {personal.website&&<span style={{color:t.ac}}>{personal.website}</span>}
            </div>
          </div>
          {photoEl(false)}
        </div>}
    <hr style={{border:"none",borderTop:`${t.ss==="hairline"?".5":t.nw>=800?"2.5":"2"}px solid ${t.primary}`,margin:"6px 0 0",opacity:t.ss==="hairline"?0.22:0.72}}/>
    <MainContent withEdu={true}/>
  </div>);
}

/* =====================================================================
   APP
===================================================================== */
const INP={width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,color:"#e2e8f0",fontSize:14,outline:"none",fontFamily:"system-ui,sans-serif",transition:"border-color .15s"};
const LBL={display:"block",fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6,fontFamily:"system-ui",textTransform:"uppercase",letterSpacing:1};
const FLD={marginBottom:20};
const G2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:16};

function App(){
  /* ── Freemium state (localStorage) ── */
  const [freeUsed, setFreeUsed]=useState(()=>{ try{return localStorage.getItem("rai_fu")==="1";}catch{return false;}});
  const [isPremium,setIsPremium]=useState(()=>{ try{return !!localStorage.getItem("rai_pr");}catch{return false;}});
  const [showPW,   setShowPW]  =useState(false);
  const [pwReason, setPwReason]=useState("");

  const activatePremium=(plan)=>{
    setIsPremium(true); setShowPW(false);
    try{localStorage.setItem("rai_pr",plan||"demo");}catch{}
  };
  const consumeFree=()=>{
    setFreeUsed(true);
    try{localStorage.setItem("rai_fu","1");}catch{}
  };
  const openPaywall=(reason)=>{ setPwReason(reason); setShowPW(true); };

  /* ── UI state ── */
  const [view,  setView]  =useState("gallery"); // gallery | form | preview
  const [tmpl,  setTmpl]  =useState(null);
  const [step,  setStep]  =useState(0);
  const [loading,setLoading]=useState(false);
  const [aiData, setAiData]=useState(null);
  const [error,  setError] =useState("");
  const [photo,  setPhoto] =useState(null);
  const [drag,   setDrag]  =useState(false);
  const [port,   setPort]  =useState([]);
  const [portDrag,setPortDrag]=useState(false);
  const resumeRef=useRef(null);
  const fRef=useRef(null);
  const portRef=useRef(null);

  const [P,setP]=useState({name:"",email:"",phone:"",location:"",linkedin:"",website:"",role:""});
  const [exps,setExps]=useState([mkE()]);
  const [edus,setEdus]=useState([mkEd()]);
  const [skills,setSkills]=useState({tech:[],soft:[],langs:[],certs:""});

  const updP=(k,v)=>setP(p=>({...p,[k]:v}));
  const updE=(id,k,v)=>setExps(e=>e.map(x=>x.id===id?{...x,[k]:v}:x));
  const updEd=(id,k,v)=>setEdus(e=>e.map(x=>x.id===id?{...x,[k]:v}:x));

  const applyPhoto=f=>{if(!f||!f.type.startsWith("image/"))return;const r=new FileReader();r.onload=e=>setPhoto(e.target.result);r.readAsDataURL(f);};
  const addPortFiles=files=>{
    Array.from(files).forEach(f=>{
      if(port.length>=10)return;
      const ok=f.type.startsWith("image/")||f.type==="application/pdf"||f.type==="image/svg+xml";
      if(!ok)return;
      const r=new FileReader();
      r.onload=e=>setPort(prev=>[...prev,{id:Date.now()+Math.random(),name:f.name,isImage:f.type.startsWith("image/"),data:e.target.result}]);
      r.readAsDataURL(f);
    });
  };

  /* ── Template selection ── */
  const handleSelectTmpl=(t)=>{
    if(t.isPremium&&!isPremium){
      openPaywall(`"${t.name}" is a Pro template. Upgrade to unlock all 15 premium designs.`);
    } else {
      setTmpl(t); setStep(0); setAiData(null); setError(""); setView("form");
    }
  };

  /* ── Generate (FIXED) ── */
  const generate=async()=>{
    if(freeUsed&&!isPremium){
      openPaywall("You’ve used your free resume generation. Upgrade to create unlimited resumes and use all premium templates.");
      return;
    }
    setLoading(true); setError("");
    try{
      const payload={
        personal:P,
        experiences:exps.map(e=>({title:e.title,company:e.company,start:e.start,end:e.end,current:e.current,description:e.desc})),
        education:edus.map(e=>({school:e.school,degree:e.degree,field:e.field,start:e.start,end:e.end,gpa:e.gpa})),
        skills:{tech:Array.isArray(skills.tech)?skills.tech.join(", "):"",soft:Array.isArray(skills.soft)?skills.soft.join(", "):"",langs:Array.isArray(skills.langs)?skills.langs.join(", "):"",certs:skills.certs||""}
      };
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),35000);
      const res=await fetch("/api/generate",{
        method:"POST",headers:{"Content-Type":"application/json"},
        signal:controller.signal,
        body:JSON.stringify({
          targetRole:P.role||"Professional",
          payload
        })
      });
      clearTimeout(timeout);
      const responseText=await res.text();
      let parsed; try{parsed=responseText?JSON.parse(responseText):{};}catch{parsed={error:responseText};}
      if(!res.ok)throw new Error(parsed.error||parsed.detail||`API error ${res.status}`);
      if(!parsed || typeof parsed!=="object")throw new Error("Unexpected API response — please retry.");
      if(!parsed.summary)parsed.summary="Experienced professional delivering measurable results.";
      if(!Array.isArray(parsed.experience))parsed.experience=[];
      consumeFree();
      setAiData(parsed); setView("preview");
    }catch(err){setError(err.name==="AbortError"?"Generation timed out. Please retry in a moment.":(err.message||"Generation failed — please try again."));}
    finally{setLoading(false);}
  };

  const printResume=()=>{
    const html=resumeRef.current?.innerHTML; if(!html)return;
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${P.name||"Resume"}—Resume<\/title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Calibri,'Segoe UI',Arial,sans-serif;color:#111;background:#fff;padding:.5in .68in;max-width:820px;margin:0 auto;font-size:10.5pt;line-height:1.4}ul{padding-left:17px}li{margin-bottom:2pt;line-height:1.58}table{border-collapse:collapse;width:100%}img{max-width:100%;display:block}<\/style><\/head><body>${html}<\/body><\/html>`);
    w.document.close(); setTimeout(()=>w.print(),400);
  };

  /* ── Shared form helpers ── */
  const SC=(id,lbl,body,onRm)=>(
    <div key={id} style={{background:"#0a1628",borderRadius:12,padding:20,marginBottom:16,border:"1px solid #1e293b"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{fontFamily:"system-ui",fontSize:12,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1}}>{lbl}</span>
        {onRm&&<button onClick={onRm} style={{background:"none",border:"1px solid #3f1010",color:"#f87171",borderRadius:6,padding:"3px 12px",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>Remove</button>}
      </div>
      {body}
    </div>);
  const addBtn=(lbl,fn)=><button onClick={fn} style={{width:"100%",padding:11,background:"transparent",border:"1.5px dashed #1e293b",borderRadius:10,color:"#475569",cursor:"pointer",fontSize:13,fontFamily:"system-ui",display:"block",marginBottom:4}}>+ {lbl}</button>;
  const DP=v=>v?<span style={{fontSize:11,color:"#f59e0b",fontFamily:"system-ui",marginTop:4,display:"block"}}>→ {fmtD(v)}</span>:null;

  /* ── STEP RENDERERS ── */
  const renderStep=()=>{
    if(step===0)return(
      <div>
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);applyPhoto(e.dataTransfer.files[0]);}} style={{display:"flex",alignItems:"center",gap:20,marginBottom:26,padding:"18px 22px",background:"#0a1628",borderRadius:12,border:"1.5px dashed "+(drag?"#f59e0b":"#1e293b"),transition:"border-color .2s"}}>
          <div onClick={()=>fRef.current?.click()} style={{width:80,height:80,borderRadius:"50%",border:"2.5px solid "+(photo?"#f59e0b":"#1e293b"),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",flexShrink:0,background:photo?"transparent":"#0f172a"}}>
            {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<div style={{textAlign:"center"}}><div style={{fontSize:26,color:"#334155",lineHeight:1}}>+</div><div style={{fontSize:10,color:"#475569",fontFamily:"system-ui",marginTop:2}}>Photo</div></div>}
          </div>
          <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>applyPhoto(e.target.files[0])}/>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui",marginBottom:5}}>Profile Photo <span style={{color:"#475569",fontWeight:400,fontSize:12}}>(Optional)</span></div>
            <div style={{fontSize:12,color:"#475569",fontFamily:"system-ui",lineHeight:1.75}}>Drag & drop or click the circle to upload.<br/><span style={{fontSize:11,color:"#334155"}}>JPG or PNG · Recommended for Asia-Pacific markets</span></div>
            {photo&&<button onClick={e=>{e.stopPropagation();setPhoto(null);}} style={{marginTop:8,fontSize:11,color:"#f87171",background:"none",border:"none",cursor:"pointer",fontFamily:"system-ui",padding:0}}>✕ Remove</button>}
          </div>
        </div>
        <div style={FLD}><label style={LBL}>Full Name</label><input style={INP} value={P.name} onChange={e=>updP("name",e.target.value)} placeholder="e.g. Sarah Chen"/></div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>Email</label><input style={INP} value={P.email} onChange={e=>updP("email",e.target.value)} placeholder="sarah@example.com"/></div>
          <div style={FLD}><label style={LBL}>Phone</label><input style={INP} value={P.phone} onChange={e=>updP("phone",e.target.value)} placeholder="+60 12-345 6789"/></div>
        </div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>Location</label><input style={INP} value={P.location} onChange={e=>updP("location",e.target.value)} placeholder="Kuala Lumpur, Malaysia"/></div>
          <div style={FLD}><label style={LBL}>Position Applying For</label><input style={INP} value={P.role} onChange={e=>updP("role",e.target.value)} placeholder="e.g. UX Designer / Software Engineer"/></div>
        </div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>LinkedIn URL</label><input style={INP} value={P.linkedin} onChange={e=>updP("linkedin",e.target.value)} placeholder="linkedin.com/in/sarahchen"/></div>
          <div style={FLD}><label style={LBL}>Portfolio / Website</label><input style={INP} value={P.website} onChange={e=>updP("website",e.target.value)} placeholder="sarahchen.design"/></div>
        </div>
      </div>);
    if(step===1)return(
      <div>
        {exps.map((exp,i)=>SC(exp.id,`Work Experience ${i+1}`,(
          <div>
            <div style={G2}>
              <div style={FLD}><label style={LBL}>Job Title</label><input style={INP} value={exp.title} onChange={e=>updE(exp.id,"title",e.target.value)} placeholder="senior product designer"/></div>
              <div style={FLD}><label style={LBL}>Company</label><input style={INP} value={exp.company} onChange={e=>updE(exp.id,"company",e.target.value)} placeholder="shopee"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:16,alignItems:"start"}}>
              <div style={FLD}><label style={LBL}>Start Date</label><input style={INP} value={exp.start} onChange={e=>updE(exp.id,"start",e.target.value)} placeholder="jan2022"/>{DP(exp.start)}</div>
              <div style={FLD}><label style={LBL}>End Date</label><input style={{...INP,opacity:exp.current?0.35:1}} disabled={exp.current} value={exp.end} onChange={e=>updE(exp.id,"end",e.target.value)} placeholder="apr2026"/>{!exp.current&&DP(exp.end)}</div>
              <div style={{paddingTop:26,display:"flex",alignItems:"center",gap:8}}><input type="checkbox" id={"c"+exp.id} checked={exp.current} onChange={e=>updE(exp.id,"current",e.target.checked)} style={{width:16,height:16,accentColor:"#f59e0b",cursor:"pointer"}}/><label htmlFor={"c"+exp.id} style={{...LBL,margin:0,textTransform:"none",fontSize:12,cursor:"pointer",color:"#94a3b8"}}>Present</label></div>
            </div>
            <div style={FLD}><label style={LBL}>Responsibilities & Achievements</label><textarea style={{...INP,height:96,resize:"vertical",lineHeight:1.6}} value={exp.desc} onChange={e=>updE(exp.id,"desc",e.target.value)} placeholder="Describe your role, key projects, team size, tools, and measurable results. AI will turn this into strong bullets."/><span style={{fontSize:11,color:"#334155",fontFamily:"system-ui"}}>Tip: include numbers, team size, revenue — AI uses these for metrics</span></div>
          </div>),exps.length>1?()=>setExps(e=>e.filter(x=>x.id!==exp.id)):null))}
        {addBtn("Add Another Experience",()=>setExps(e=>[...e,mkE()]))}
      </div>);
    if(step===2)return(
      <div>
        {edus.map((edu,i)=>SC(edu.id,`Education ${i+1}`,(
          <div>
            <div style={FLD}><label style={LBL}>Institution</label><input style={INP} value={edu.school} onChange={e=>updEd(edu.id,"school",e.target.value)} placeholder="universiti malaya"/></div>
            <div style={G2}>
              <div style={FLD}><label style={LBL}>Degree</label><input style={INP} value={edu.degree} onChange={e=>updEd(edu.id,"degree",e.target.value)} placeholder="bachelor of design"/></div>
              <div style={FLD}><label style={LBL}>Field of Study</label><input style={INP} value={edu.field} onChange={e=>updEd(edu.id,"field",e.target.value)} placeholder="visual communication"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
              <div style={FLD}><label style={LBL}>Start Year</label><input style={INP} value={edu.start} onChange={e=>updEd(edu.id,"start",e.target.value)} placeholder="2019"/>{DP(edu.start)}</div>
              <div style={FLD}><label style={LBL}>End Year</label><input style={INP} value={edu.end} onChange={e=>updEd(edu.id,"end",e.target.value)} placeholder="2023"/>{DP(edu.end)}</div>
              <div style={FLD}><label style={LBL}>GPA (Optional)</label><input style={INP} value={edu.gpa} onChange={e=>updEd(edu.id,"gpa",e.target.value)} placeholder="3.85 / 4.0"/></div>
            </div>
          </div>),edus.length>1?()=>setEdus(e=>e.filter(x=>x.id!==edu.id)):null))}
        {addBtn("Add Another Education",()=>setEdus(e=>[...e,mkEd()]))}
      </div>);
    if(step===3)return(
      <div>
        <div style={FLD}>
          <label style={LBL}>Technical Skills <span style={{color:"#334155",fontWeight:400,fontSize:10,textTransform:"none",letterSpacing:0}}>— 1,500+ skills across 18 industries</span></label>
          <TagSelect selected={skills.tech} onChange={v=>setSkills(s=>({...s,tech:v}))} options={ALL_TECH} cats={SKILL_CATS} placeholder="Filter by industry above, or type any skill…" chipBg="#0f2d1a" chipColor="#4ade80" accent="#16a34a"/>
        </div>
        <div style={FLD}>
          <label style={LBL}>Soft Skills</label>
          <TagSelect selected={skills.soft} onChange={v=>setSkills(s=>({...s,soft:v}))} options={SOFT_OPS} placeholder="Search soft skills (e.g. Leadership, Agile)…" chipBg="#1e1a0f" chipColor="#fbbf24" accent="#b45309"/>
        </div>
        <div style={FLD}>
          <label style={LBL}>Languages</label>
          <TagSelect selected={skills.langs} onChange={v=>setSkills(s=>({...s,langs:v}))} options={LANG_OPS} placeholder="Search by language with proficiency…" chipBg="#1a0f2e" chipColor="#c4b5fd" accent="#7c3aed"/>
          <span style={{fontSize:11,color:"#334155",fontFamily:"system-ui",marginTop:4,display:"block"}}>Select with proficiency level, or type a custom entry</span>
        </div>
        <div style={FLD}>
          <label style={LBL}>Certifications <span style={{color:"#334155",fontWeight:400,textTransform:"none",letterSpacing:0}}>(one per line)</span></label>
          <textarea style={{...INP,height:88,resize:"vertical",lineHeight:1.7}} value={skills.certs} onChange={e=>setSkills(s=>({...s,certs:e.target.value}))} placeholder={"AWS Certified Solutions Architect\nAdobe Certified Professional\nPMP — Project Management Professional"}/>
        </div>
      </div>);
    if(step===4)return(
      <div>
        <div style={{background:"#0a1628",borderRadius:12,padding:20,border:"1px solid #1e293b",marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui",marginBottom:4}}>Portfolio / Work Samples <span style={{color:"#475569",fontWeight:400,fontSize:12}}>(Optional)</span></div>
          <div style={{fontSize:12,color:"#475569",fontFamily:"system-ui",marginBottom:14,lineHeight:1.7}}>Upload images or PDFs of your work. Thumbnails will appear in your resume.<br/><span style={{color:"#334155",fontSize:11}}>Ideal for designers, photographers, architects, and creatives.</span></div>
          <div onDragOver={e=>{e.preventDefault();setPortDrag(true);}} onDragLeave={()=>setPortDrag(false)} onDrop={e=>{e.preventDefault();setPortDrag(false);addPortFiles(e.dataTransfer.files);}} onClick={()=>portRef.current?.click()} style={{border:"2px dashed "+(portDrag?"#f59e0b":"#1e293b"),borderRadius:10,padding:"28px 16px",textAlign:"center",cursor:"pointer",background:portDrag?"rgba(245,158,11,.05)":"transparent",transition:"all .2s"}}>
            <div style={{fontSize:32,marginBottom:8}}>🖼️</div>
            <div style={{fontSize:14,fontWeight:700,color:"#94a3b8",fontFamily:"system-ui",marginBottom:4}}>Drag & drop your work here</div>
            <div style={{fontSize:11,color:"#334155",fontFamily:"system-ui"}}>JPG · PNG · GIF · WebP · PDF · SVG · up to 10 files</div>
          </div>
          <input ref={portRef} type="file" multiple accept="image/*,.pdf,.svg" style={{display:"none"}} onChange={e=>addPortFiles(e.target.files)}/>
          {port.length>0&&<div style={{marginTop:16}}>
            <div style={{fontSize:11,color:"#475569",fontFamily:"system-ui",marginBottom:10}}>{port.length}/10 uploaded</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {port.map(p=>(
                <div key={p.id} style={{position:"relative",background:"#0f172a",borderRadius:8,overflow:"hidden",border:"1px solid #1e293b"}}>
                  {p.isImage?<img src={p.data} style={{width:"100%",height:80,objectFit:"cover",display:"block"}} alt={p.name}/>:<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:4}}><span style={{fontSize:28}}>📄</span><span style={{fontSize:9,color:"#64748b",fontFamily:"system-ui",textAlign:"center",padding:"0 4px",wordBreak:"break-all"}}>{p.name.slice(0,20)}</span></div>}
                  <button onClick={()=>setPort(p2=>p2.filter(x=>x.id!==p.id))} style={{position:"absolute",top:4,right:4,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,.7)",border:"none",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>&#215;</button>
                  <div style={{padding:"4px 6px",fontSize:9,color:"#64748b",fontFamily:"system-ui",textOverflow:"ellipsis",overflow:"hidden",whiteSpace:"nowrap"}}>{p.name}</div>
                </div>))}
            </div>
          </div>}
        </div>
      </div>);
  };

  /* ── LAYOUT ── */
  const SLAB=["Personal","Experience","Education","Skills","Portfolio","Resume"];
  const SICO=["✶","◈","◎","◇","⊕","★"];
  const STIT=["Tell us about yourself","Your work experience","Education background","Skills & qualifications","Portfolio & work samples"];
  const SSUB=["Fill in your details and optionally add a profile photo.","Add your work history — more detail produces stronger AI bullets.","Your academic credentials and qualifications.","Search 1,500+ skills across 18 industries, or type any skill.","Upload images or PDFs of your creative work (optional)."];

  /* ── GALLERY VIEW ── */
  if(view==="gallery") return(
    <>
      <TemplateGallery onSelect={handleSelectTmpl} isPremium={isPremium} onPaywall={t=>openPaywall(`"${t.name}" is a Pro template. Upgrade to unlock all 15 premium designs.`)}/>
      {showPW&&<PaywallModal reason={pwReason} onClose={()=>setShowPW(false)} onPay={activatePremium}/>}
    </>);

  /* ── FORM VIEW ── */
  if(view==="form") return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}input:focus,textarea:focus{border-color:#f59e0b!important;outline:none}`}</style>
      {/* Form header */}
      <div style={{background:"rgba(0,0,0,.3)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 24px",display:"flex",alignItems:"center",gap:12,backdropFilter:"blur(12px)"}}>
        <button onClick={()=>setView("gallery")} style={{background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"system-ui",padding:"6px 13px"}}>&#8592; Templates</button>
        {tmpl&&<div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:42,borderRadius:4,overflow:"hidden",border:"1px solid #334155",flexShrink:0,lineHeight:0}}><ThumbSVG t={tmpl}/></div>
          <div><div style={{fontSize:12,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui"}}>{tmpl.name}</div><div style={{fontSize:10,color:"#475569",fontFamily:"system-ui"}}>{tmpl.tagline}</div></div>
          {tmpl.isPremium&&<span style={{fontSize:9,background:"#1e3a8a",color:"#93c5fd",borderRadius:4,padding:"1px 6px",fontFamily:"system-ui",fontWeight:700}}>PRO</span>}
        </div>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
          {SLAB.map((l,i)=>(
            <span key={i} style={{display:"flex",alignItems:"center",gap:3}}>
              <span onClick={()=>i<=step&&setStep(i)} style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i===step?"#f59e0b":i<step?"#0f3d21":"#0f172a",border:"2px solid "+(i===step?"#f59e0b":i<step?"#16a34a":"#1e293b"),fontSize:12,cursor:i<=step?"pointer":"default",color:i<step?"#4ade80":"#fff",fontWeight:i<step?700:400}}>{i<step?"✓":SICO[i]}</span>
              {i<5&&<div style={{width:18,height:1.5,background:i<step?"#16a34a":"#1e293b",flexShrink:0}}/>}
            </span>))}
        </div>
      </div>
      {/* Form body */}
      <div style={{maxWidth:740,margin:"0 auto",padding:"24px 20px 60px"}}>
        <div style={{background:"#111827",borderRadius:16,border:"1px solid rgba(255,255,255,.06)",padding:"28px 32px"}}>
          <div style={{marginBottom:22,paddingBottom:18,borderBottom:"1px solid #0f172a"}}>
            <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",margin:"0 0 4px",fontFamily:"system-ui"}}>{STIT[step]}</h2>
            <p style={{fontSize:12,color:"#475569",margin:0,fontFamily:"system-ui"}}>{SSUB[step]}</p>
          </div>
          {renderStep()}
          {error&&<div style={{background:"#160606",border:"1px solid #450a0a",borderRadius:8,padding:"11px 14px",color:"#f87171",fontSize:13,fontFamily:"system-ui",marginBottom:12}}>⚠ {error}</div>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:22,paddingTop:18,borderTop:"1px solid #0f172a"}}>
            <button onClick={()=>step>0?setStep(s=>s-1):setView("gallery")} style={{padding:"10px 20px",background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"system-ui"}}>{step===0?"← Gallery":"← Back"}</button>
            {step<4
              ?<button onClick={()=>setStep(s=>s+1)} style={{padding:"10px 26px",background:"#f59e0b",border:"none",borderRadius:8,color:"#0a0700",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"system-ui"}}>Continue →</button>
              :<button onClick={generate} disabled={loading} style={{padding:"10px 26px",background:loading?"#1e293b":"#f59e0b",border:"none",borderRadius:8,color:loading?"#475569":"#0a0700",fontWeight:700,cursor:loading?"not-allowed":"pointer",fontSize:14,fontFamily:"system-ui",display:"flex",alignItems:"center",gap:10,minWidth:220,justifyContent:"center"}}>
                {loading?<><span style={{display:"inline-block",width:14,height:14,border:"2px solid #475569",borderTop:"2px solid #94a3b8",borderRadius:"50%",animation:"spin .8s linear infinite"}}></span>AI generating…</>:"✨ Generate My Resume"}
              </button>}
          </div>
        </div>
        {!freeUsed&&!isPremium&&<div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#334155",fontFamily:"system-ui"}}>&#127381; You have 1 free resume generation remaining</div>}
      </div>
      {showPW&&<PaywallModal reason={pwReason} onClose={()=>setShowPW(false)} onPay={activatePremium}/>}
    </div>);

  /* ── PREVIEW VIEW ── */
  return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      <div style={{background:"rgba(0,0,0,.3)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 24px",display:"flex",alignItems:"center",gap:10,backdropFilter:"blur(12px)"}}>
        <div style={{width:32,height:32,background:"#f59e0b",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#0a0700",flexShrink:0}}>✶</div>
        <div style={{fontSize:14,fontWeight:800,color:"#f8fafc",fontFamily:"system-ui"}}>ResumeAI Pro</div>
        {!isPremium&&<div style={{marginLeft:8,background:"#0f3d21",color:"#4ade80",borderRadius:10,padding:"2px 8px",fontSize:10,fontFamily:"system-ui",fontWeight:700}}>1 free resume used</div>}
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          <button onClick={()=>setView("gallery")} style={{padding:"7px 14px",background:"transparent",border:"1px solid #1e293b",borderRadius:7,color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>Change Template</button>
          <button onClick={()=>{if(!isPremium&&freeUsed){openPaywall("Upgrade to edit and regenerate unlimited resumes.");return;}setView("form");}} style={{padding:"7px 14px",background:"transparent",border:"1px solid #1e293b",borderRadius:7,color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>✎ Edit Info</button>
          <button onClick={printResume} style={{padding:"7px 16px",background:"#f59e0b",border:"none",borderRadius:7,color:"#0a0700",fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>↓ Download PDF</button>
        </div>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"24px 20px 60px"}}>
        <div style={{marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",margin:"0 0 3px",fontFamily:"system-ui"}}>🎉 Your Resume is Ready!</h2>
            <p style={{fontSize:11,color:"#475569",margin:0,fontFamily:"system-ui"}}>Template: {tmpl?.name} · {tmpl?.tagline}</p>
          </div>
          {!isPremium&&<button onClick={()=>openPaywall("Unlock all 17 templates and unlimited regenerations.")} style={{padding:"8px 18px",background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:8,color:"#0a0700",fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>👑 Upgrade to Pro</button>}
        </div>
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 20px 60px rgba(0,0,0,.6)",marginBottom:18,overflow:"hidden"}}>
          <div ref={resumeRef}><ResumeView tmpl={tmpl} personal={P} exps={exps} edus={edus} skills={skills} aiData={aiData} photo={photo} portfolio={port} rRef={resumeRef}/></div>
        </div>
        <div style={{background:"#05140b",border:"1px solid #052e16",borderRadius:10,padding:"13px 18px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#4ade80",marginBottom:7,fontFamily:"system-ui"}}>✓ Optimised for maximum interview success</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 20px"}}>
            {["Dates auto-formatted → Dec 2024 – Apr 2026","Job titles & company names in Title Case","Achievement bullets with action verbs & metrics","Professional summary tailored to your target role","ATS-optimised — passes Fortune 500 screening","Portfolio images embedded as thumbnails (if uploaded)"].map((tx,i)=>(
              <div key={i} style={{fontSize:11,color:"#86efac",fontFamily:"system-ui",lineHeight:1.7,display:"flex",gap:6}}><span style={{color:"#4ade80",flexShrink:0}}>→</span>{tx}</div>))}
          </div>
        </div>
      </div>
      {showPW&&<PaywallModal reason={pwReason} onClose={()=>setShowPW(false)} onPay={activatePremium}/>}
    </div>);
}

// ── Mount ──────────────────────────────────────────────────────────────
const _rt=document.getElementById("root");
ReactDOM.createRoot(_rt).render(<App/>);
document.getElementById("splash").style.opacity="0";
setTimeout(()=>{const s=document.getElementById("splash");if(s)s.style.display="none";},500);
</script>
</body>
</html>
