<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ResumeAI — 200+ Professional Templates</title>
<meta name="description" content="Build a professional, ATS-optimised resume in minutes with AI. Choose from 200+ templates."/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#060c1a;font-family:system-ui,-apple-system,sans-serif}
#root{min-height:100vh}
#splash{position:fixed;inset:0;background:#060c1a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .4s}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .35s ease both}
input:focus,textarea:focus{border-color:#f59e0b!important;box-shadow:0 0 0 3px rgba(245,158,11,.1)!important;outline:none}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>
<div id="splash">
  <div style="width:52px;height:52px;background:#f59e0b;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#0a0700">✦</div>
  <div style="font-size:22px;font-weight:800;color:#f8fafc;letter-spacing:.3px">ResumeAI</div>
  <div style="font-size:12px;color:#475569">Preparing 200+ templates…</div>
  <div style="width:26px;height:26px;border:3px solid #1e293b;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;margin-top:6px"></div>
</div>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useMemo,memo,useCallback}=React;

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */

═══════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════════════════ */
const CAT_F=["All","Classic","Modern","Executive","Creative","Minimal"];
const LAY_F=["All Layouts","Traditional","Two-Column","Formal","Creative","Modern","Practical","Minimal"];

function Gallery({onSelect}){
  const [catF,setCatF]=useState("All");
  const [layF,setLayF]=useState("All Layouts");
  const [q,setQ]=useState("");
  const [hov,setHov]=useState(null);

  const list=useMemo(()=>TEMPLATES.filter(t=>{
    const cOk=catF==="All"||t.scheme.cat===catF;
    const lOk=layF==="All Layouts"||t.layout.cat===layF;
    const qOk=!q||t.sName.toLowerCase().includes(q.toLowerCase())||t.lName.toLowerCase().includes(q.toLowerCase());
    return cOk&&lOk&&qOk;
  }),[catF,layF,q]);

  const Pill=({label,active,onClick})=>(
    <button onClick={onClick} style={{padding:"5px 13px",borderRadius:20,border:"1px solid "+(active?"#f59e0b":"#1e293b"),background:active?"#f59e0b":"transparent",color:active?"#0a0700":"#64748b",fontSize:12,cursor:"pointer",fontFamily:"system-ui",fontWeight:active?700:400,whiteSpace:"nowrap",transition:"all .15s"}}>{label}</button>
  );
  return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      {/* header */}
      <div style={{background:"rgba(0,0,0,.35)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"14px 28px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(14px)"}}>
        <div style={{width:36,height:36,background:"#f59e0b",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#0a0700",flexShrink:0}}>✦</div>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:"#f8fafc",fontFamily:"system-ui"}}>ResumeAI</div>
          <div style={{fontSize:11,color:"#475569",fontFamily:"system-ui"}}>AI-Powered Resume Builder</div>
        </div>
        <span style={{background:"#1e293b",color:"#f59e0b",borderRadius:20,padding:"3px 10px",fontSize:11,fontFamily:"system-ui",fontWeight:700,marginLeft:2}}>{TEMPLATES.length}+ Templates</span>

          </div>
        ))}
      </div>
    </div>
  );
}

const MM={"1":"Jan","01":"Jan","jan":"Jan","january":"Jan","2":"Feb","02":"Feb","feb":"Feb","february":"Feb","3":"Mar","03":"Mar","mar":"Mar","march":"Mar","4":"Apr","04":"Apr","apr":"Apr","april":"Apr","5":"May","05":"May","may":"May","6":"Jun","06":"Jun","jun":"Jun","june":"Jun","7":"Jul","07":"Jul","jul":"Jul","july":"Jul","8":"Aug","08":"Aug","aug":"Aug","august":"Aug","9":"Sep","09":"Sep","sep":"Sep","sept":"Sep","september":"Sep","10":"Oct","oct":"Oct","october":"Oct","11":"Nov","nov":"Nov","november":"Nov","12":"Dec","dec":"Dec","december":"Dec"};
function fmtD(str){if(!str)return"";const t=str.trim(),low=t.toLowerCase().replace(/\s+/g," ").trim();if(["present","current","now","ongoing"].includes(low))return"Present";const m1=low.match(/^([a-z]+)\s*(\d{4})$/);if(m1&&MM[m1[1]])return MM[m1[1]]+" "+m1[2];const m2=low.match(/^(\d{1,2})[\/\-](\d{4})$/);if(m2&&MM[m2[1]])return MM[m2[1]]+" "+m2[2];const m3=low.match(/^(\d{4})[\/\-](\d{1,2})$/);if(m3&&MM[m3[2]])return MM[m3[2]]+" "+m3[1];if(/^\d{4}$/.test(low))return t;return t.charAt(0).toUpperCase()+t.slice(1);}
function fmtR(s,e,cur){const a=fmtD(s),b=cur?"Present":fmtD(e);if(!a&&!b)return"";if(!a)return b;if(!b)return a;return a+" \u2013 "+b;}
const LW=new Set(["of","the","a","an","in","at","on","and","or","for","with","to","by","from","&"]);
function toTC(str){if(!str)return str;return str.split(" ").map((w,i)=>{if(!w)return w;const lw=w.toLowerCase();if(i>0&&LW.has(lw))return lw;return w.charAt(0).toUpperCase()+w.slice(1);}).join(" ");}

function TagSelect({selected,onChange,options,placeholder,chipBg="#1e3a5f",chipColor="#93c5fd",accent="#2563eb"}){
  const [q,setQ]=useState(""),[ open,setOpen]=useState(false),[hov,setHov]=useState(-1);
  const ref=useRef(null);
  const filt=options.filter(o=>o.toLowerCase().includes(q.toLowerCase())&&!selected.includes(o)).slice(0,9);
  const canAdd=q.trim().length>0&&!options.some(o=>o.toLowerCase()===q.trim().toLowerCase())&&!selected.includes(q.trim());
  const total=filt.length+(canAdd?1:0);
  const add=v=>{const t=v.trim();if(t&&!selected.includes(t))onChange([...selected,t]);setQ("");setHov(-1);if(ref.current)ref.current.focus();};
  const rm=v=>onChange(selected.filter(s=>s!==v));
  const onKD=e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();if(hov>=0&&hov<filt.length)add(filt[hov]);else if(hov===filt.length&&canAdd)add(q);else if(q.trim())add(q);}else if(e.key==="Backspace"&&!q&&selected.length>0)rm(selected[selected.length-1]);else if(e.key==="ArrowDown"){e.preventDefault();setHov(h=>Math.min(h+1,total-1));}else if(e.key==="ArrowUp"){e.preventDefault();setHov(h=>Math.max(h-1,-1));}else if(e.key==="Escape")setOpen(false);};
  return(
    <div style={{position:"relative"}}>
      <div onClick={()=>{setOpen(true);if(ref.current)ref.current.focus();}} style={{minHeight:46,padding:"6px 10px 4px",background:"#0f172a",border:"1px solid "+(open?"#f59e0b":"#1e293b"),borderRadius:8,cursor:"text",display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",transition:"border-color .15s"}}>
        {selected.map(s=><span key={s} style={{background:chipBg,color:chipColor,borderRadius:6,padding:"3px 7px 3px 10px",fontSize:12,fontFamily:"system-ui",display:"flex",alignItems:"center",gap:3,fontWeight:500}}>{s}<span onMouseDown={e=>{e.preventDefault();e.stopPropagation();rm(s);}} style={{cursor:"pointer",fontSize:15,lineHeight:1,opacity:.75,marginLeft:1}}>×</span></span>)}
        <input ref={ref} value={q} onChange={e=>{setQ(e.target.value);setOpen(true);setHov(-1);}} onKeyDown={onKD} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>{setOpen(false);setHov(-1);},180)} placeholder={selected.length===0?placeholder:"Search or type to add more\u2026"} style={{background:"transparent",border:"none",outline:"none",color:"#e2e8f0",fontSize:13,fontFamily:"system-ui",flex:1,minWidth:140,padding:"3px 4px"}}/>
      </div>
      {open&&(filt.length>0||canAdd)&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#1e293b",border:"1px solid #334155",borderRadius:10,maxHeight:230,overflowY:"auto",zIndex:300,boxShadow:"0 12px 32px rgba(0,0,0,.55)"}}>
          {filt.map((o,i)=><div key={o} onMouseDown={()=>add(o)} onMouseEnter={()=>setHov(i)} style={{padding:"9px 14px",fontSize:13,fontFamily:"system-ui",color:hov===i?"#fff":"#cbd5e1",cursor:"pointer",background:hov===i?accent:"transparent",borderBottom:"1px solid rgba(255,255,255,.04)",transition:"background .08s"}}>{o}</div>)}
          {canAdd&&<div onMouseDown={()=>add(q)} onMouseEnter={()=>setHov(filt.length)} style={{padding:"9px 14px",fontSize:13,fontFamily:"system-ui",color:hov===filt.length?"#fff":"#f59e0b",cursor:"pointer",background:hov===filt.length?"#92400e":"rgba(245,158,11,.08)",fontStyle:"italic",borderTop:"1px solid rgba(255,255,255,.06)"}}>+ Add "{q.trim()}"</div>}
        </div>
      )}
      {selected.length>0&&<div style={{marginTop:5,fontSize:11,color:"#334155",fontFamily:"system-ui"}}>{selected.length} selected · Backspace to remove last</div>}
    </div>
  );
}

function shStyle(cat,pr,ac){
  if(cat==="Classic")   return{borderBottom:"1.5px solid "+pr,paddingBottom:3,color:pr,fontSize:"8.5pt",letterSpacing:"2px",textTransform:"uppercase",marginTop:14,marginBottom:8};
  if(cat==="Modern")    return{borderLeft:"3px solid "+ac,paddingLeft:8,color:pr,fontSize:"10pt",fontWeight:700,marginTop:14,marginBottom:8};
  if(cat==="Executive") return{background:pr,color:"#fff",padding:"3px 8px",fontSize:"8pt",letterSpacing:"2.5px",textTransform:"uppercase",marginTop:14,marginBottom:8};
  if(cat==="Creative")  return{background:ac,color:"#fff",borderRadius:4,padding:"2px 10px",fontSize:"9pt",letterSpacing:"1px",marginTop:14,marginBottom:8,display:"block"};
  return{borderBottom:"0.5px solid "+pr,paddingBottom:4,color:pr,fontSize:"8.5pt",letterSpacing:"1.5px",textTransform:"uppercase",opacity:.72,marginTop:14,marginBottom:8};
}

      </div>
      <div style={{width:210,background:s.pr,padding:"40px 18px",flexShrink:0}}><SideContent/></div>
    </div>);

  if(l.type==="bold-header") return(
    <div ref={rRef} style={{fontFamily:F,background:s.bg}}>
      <div style={{background:s.pr,padding:"36px 52px 28px"}}><HdrSingle dark={true}/></div>
      <div style={{padding:"0 52px 40px"}}><MainContent withEdu={true}/></div>
    </div>);

  if(l.type==="accent-bar") return(
    <div ref={rRef} style={{display:"flex",fontFamily:F,background:s.bg}}>
      <div style={{width:8,background:s.pr,flexShrink:0}}/>
      <div style={{flex:1,padding:pad}}>
        <HdrSingle dark={false}/>
        <hr style={{border:"none",borderTop:"1.5px solid "+s.pr,margin:"8px 0 0",opacity:.4}}/>
        <MainContent withEdu={true}/>
      </div>
    </div>);

  return(
    <div ref={rRef} style={{fontFamily:F,padding:pad,background:s.bg}}>
      <HdrSingle dark={false}/>
      <hr style={{border:"none",borderTop:"2px solid "+s.pr,margin:"8px 0 0",opacity:l.type==="minimal"?.25:.75}}/>
      <MainContent withEdu={true}/>
    </div>);
}

/* ═══════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════ */
const INP={width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,color:"#e2e8f0",fontSize:14,outline:"none",fontFamily:"system-ui,sans-serif",transition:"border-color .15s"};
const LBL={display:"block",fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6,fontFamily:"system-ui",textTransform:"uppercase",letterSpacing:1};
const FLD={marginBottom:20};
const G2={display:"grid",gridTemplateColumns:"1fr 1fr",gap:16};

function App(){
  const [view,setView]=useState("gallery");
  const [tmpl,setTmpl]=useState(null);
  const [step,setStep]=useState(0);
  const [loading,setLoading]=useState(false);
  const [aiData,setAiData]=useState(null);
  const [err,setErr]=useState("");
  const [photo,setPhoto]=useState(null);
  const [drag,setDrag]=useState(false);
  const rRef=useRef(null);
  const fRef=useRef(null);

  const [P,setP]=useState({name:"",email:"",phone:"",location:"",linkedin:"",website:"",role:""});
  const [exps,setExps]=useState([mkE()]);
  const [edus,setEdus]=useState([mkEd()]);
  const [skills,setSkills]=useState({tech:[],soft:[],langs:[],certs:""});

  const updP=(k,v)=>setP(p=>({...p,[k]:v}));
  const updE=(id,k,v)=>setExps(e=>e.map(x=>x.id===id?{...x,[k]:v}:x));
  const updEd=(id,k,v)=>setEdus(e=>e.map(x=>x.id===id?{...x,[k]:v}:x));

  const applyPhoto=f=>{if(!f||!f.type.startsWith("image/"))return;const r=new FileReader();r.onload=e=>setPhoto(e.target.result);r.readAsDataURL(f);};

  const generate=async()=>{
    setLoading(true);setErr("");
    try{
      const body={
        personal:P,
        experiences:exps.map(e=>({title:e.title,company:e.company,start:e.start,end:e.end,current:e.current,description:e.desc})),
        education:edus.map(e=>({school:e.school,degree:e.degree,field:e.field,start:e.start,end:e.end,gpa:e.gpa})),
        skills:{tech:skills.tech.join(", "),soft:skills.soft.join(", "),langs:skills.langs.join(", "),certs:skills.certs}
      };
      const res=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Generation failed");
      setAiData(data);setView("preview");
    }catch(e){setErr(e.message||"Generation failed — please try again.");}
    setLoading(false);
  };

  const printR=()=>{
    const html=rRef.current?.innerHTML;if(!html)return;
    const w=window.open("","_blank");
    w.document.write("<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>"+P.name+" \u2014 Resume<\/title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Calibri,'Segoe UI',Arial,sans-serif;color:#111;background:#fff;padding:.5in .68in;max-width:820px;margin:0 auto;font-size:10.5pt;line-height:1.4}ul{padding-left:17px}li{margin-bottom:2pt;line-height:1.58}table{border-collapse:collapse;width:100%}<\/style><\/head><body>"+html+"<\/body><\/html>");
    w.document.close();setTimeout(()=>w.print(),400);
  };

  const DP=(v)=>v?<span style={{fontSize:11,color:"#f59e0b",fontFamily:"system-ui",marginTop:4,display:"block"}}>{"\u2192"} {fmtD(v)}</span>:null;

  const SC=(id,lbl,body,onRm)=>(
    <div key={id} style={{background:"#0a1628",borderRadius:12,padding:20,marginBottom:16,border:"1px solid #1e293b"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{fontFamily:"system-ui",fontSize:12,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:1}}>{lbl}</span>
        {onRm&&<button onClick={onRm} style={{background:"none",border:"1px solid #3f1010",color:"#f87171",borderRadius:6,padding:"3px 12px",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>Remove</button>}
      </div>
      {body}
    </div>);

  const addBtn=(lbl,fn)=><button onClick={fn} style={{width:"100%",padding:11,background:"transparent",border:"1.5px dashed #1e293b",borderRadius:10,color:"#475569",cursor:"pointer",fontSize:13,fontFamily:"system-ui",display:"block"}}>+ {lbl}</button>;

  const STEP_TITLES=["Tell us about yourself","Your work experience","Your education","Skills & qualifications"];
  const STEP_SUBS=["Fill in your details and optionally upload a profile photo.","Add each role — more detail means stronger AI-generated bullets.","Academic credentials and degrees.","Search and select your skills, languages, and certifications."];
  const STEP_ICONS=["✦","◈","◎","◇"];

  const renderStep=()=>{
    if(step===0)return(
      <div>
        <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);applyPhoto(e.dataTransfer.files[0]);}} style={{display:"flex",alignItems:"center",gap:20,marginBottom:26,padding:"18px 22px",background:"#0a1628",borderRadius:12,border:"1.5px dashed "+(drag?"#f59e0b":"#1e293b"),transition:"border-color .2s"}}>
          <div onClick={()=>fRef.current?.click()} style={{width:80,height:80,borderRadius:"50%",border:"2.5px solid "+(photo?"#f59e0b":drag?"#f59e0b":"#1e293b"),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",flexShrink:0,background:photo?"transparent":"#0f172a",transition:"all .2s"}}>
            {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<div style={{textAlign:"center"}}><div style={{fontSize:26,color:"#334155",lineHeight:1}}>+</div><div style={{fontSize:10,color:"#475569",fontFamily:"system-ui",marginTop:2}}>Photo</div></div>}
          </div>
          <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>applyPhoto(e.target.files[0])}/>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui",marginBottom:5}}>Profile Photo <span style={{color:"#475569",fontWeight:400,fontSize:12}}>(Optional)</span></div>
            <div style={{fontSize:12,color:"#475569",fontFamily:"system-ui",lineHeight:1.75}}>Drag & drop or click the circle to upload.<br/><span style={{fontSize:11,color:"#334155"}}>JPG or PNG · Recommended for Asia-Pacific markets</span></div>
            {photo&&<button onClick={e=>{e.stopPropagation();setPhoto(null);}} style={{marginTop:8,fontSize:11,color:"#f87171",background:"none",border:"none",cursor:"pointer",fontFamily:"system-ui",padding:0}}>{"\u2715"} Remove photo</button>}
          </div>
        </div>
        <div style={FLD}><label style={LBL}>Full Name</label><input style={INP} value={P.name} onChange={e=>updP("name",e.target.value)} placeholder="e.g. Sarah Chen"/></div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>Email</label><input style={INP} value={P.email} onChange={e=>updP("email",e.target.value)} placeholder="sarah@example.com"/></div>
          <div style={FLD}><label style={LBL}>Phone</label><input style={INP} value={P.phone} onChange={e=>updP("phone",e.target.value)} placeholder="+60 12-345 6789"/></div>
        </div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>Location</label><input style={INP} value={P.location} onChange={e=>updP("location",e.target.value)} placeholder="Kuala Lumpur, Malaysia"/></div>
          <div style={FLD}><label style={LBL}>Position Applying For</label><input style={INP} value={P.role} onChange={e=>updP("role",e.target.value)} placeholder="e.g. senior product manager"/></div>
        </div>
        <div style={G2}>
          <div style={FLD}><label style={LBL}>LinkedIn URL</label><input style={INP} value={P.linkedin} onChange={e=>updP("linkedin",e.target.value)} placeholder="linkedin.com/in/sarahchen"/></div>
          <div style={FLD}><label style={LBL}>Portfolio / Website</label><input style={INP} value={P.website} onChange={e=>updP("website",e.target.value)} placeholder="sarahchen.dev"/></div>
        </div>
      </div>);

    if(step===1)return(
      <div>
        {exps.map((exp,i)=>SC(exp.id,"Work Experience "+(i+1),(
          <div>
            <div style={G2}>
              <div style={FLD}><label style={LBL}>Job Title</label><input style={INP} value={exp.title} onChange={e=>updE(exp.id,"title",e.target.value)} placeholder="software engineer"/></div>
              <div style={FLD}><label style={LBL}>Company</label><input style={INP} value={exp.company} onChange={e=>updE(exp.id,"company",e.target.value)} placeholder="google"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:16,alignItems:"start"}}>
              <div style={FLD}><label style={LBL}>Start Date</label><input style={INP} value={exp.start} onChange={e=>updE(exp.id,"start",e.target.value)} placeholder="dec2024"/>{DP(exp.start)}</div>
              <div style={FLD}><label style={LBL}>End Date</label><input style={{...INP,opacity:exp.current?.35:1}} disabled={exp.current} value={exp.end} onChange={e=>updE(exp.id,"end",e.target.value)} placeholder="apr2026"/>{!exp.current&&DP(exp.end)}</div>
              <div style={{paddingTop:26,display:"flex",alignItems:"center",gap:8}}><input type="checkbox" id={"c"+exp.id} checked={exp.current} onChange={e=>updE(exp.id,"current",e.target.checked)} style={{width:16,height:16,accentColor:"#f59e0b",cursor:"pointer"}}/><label htmlFor={"c"+exp.id} style={{...LBL,margin:0,textTransform:"none",fontSize:12,cursor:"pointer",color:"#94a3b8"}}>Present</label></div>
            </div>
            <div style={FLD}><label style={LBL}>Responsibilities & Achievements</label><textarea style={{...INP,height:96,resize:"vertical",lineHeight:1.6}} value={exp.desc} onChange={e=>updE(exp.id,"desc",e.target.value)} placeholder="Describe your role, key projects, team size, tools used, budgets managed, and measurable results. AI will transform this into strong bullet points."/><span style={{fontSize:11,color:"#334155",fontFamily:"system-ui"}}>Tip: more detail = stronger AI-generated bullets</span></div>
          </div>),exps.length>1?()=>setExps(e=>e.filter(x=>x.id!==exp.id)):null))}
        {addBtn("Add Another Experience",()=>setExps(e=>[...e,mkE()]))}
      </div>);

    if(step===2)return(
      <div>
        {edus.map((edu,i)=>SC(edu.id,"Education "+(i+1),(
          <div>
            <div style={FLD}><label style={LBL}>Institution</label><input style={INP} value={edu.school} onChange={e=>updEd(edu.id,"school",e.target.value)} placeholder="universiti malaya"/></div>
            <div style={G2}>
              <div style={FLD}><label style={LBL}>Degree</label><input style={INP} value={edu.degree} onChange={e=>updEd(edu.id,"degree",e.target.value)} placeholder="bachelor of science"/></div>
              <div style={FLD}><label style={LBL}>Field of Study</label><input style={INP} value={edu.field} onChange={e=>updEd(edu.id,"field",e.target.value)} placeholder="computer science"/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
              <div style={FLD}><label style={LBL}>Start Year</label><input style={INP} value={edu.start} onChange={e=>updEd(edu.id,"start",e.target.value)} placeholder="2019"/>{DP(edu.start)}</div>
              <div style={FLD}><label style={LBL}>End Year</label><input style={INP} value={edu.end} onChange={e=>updEd(edu.id,"end",e.target.value)} placeholder="2023"/>{DP(edu.end)}</div>
              <div style={FLD}><label style={LBL}>GPA (Optional)</label><input style={INP} value={edu.gpa} onChange={e=>updEd(edu.id,"gpa",e.target.value)} placeholder="3.85 / 4.0"/></div>
            </div>
          </div>),edus.length>1?()=>setEdus(e=>e.filter(x=>x.id!==edu.id)):null))}
        {addBtn("Add Another Education",()=>setEdus(e=>[...e,mkEd()]))}
      </div>);

    if(step===3)return(
      <div>
        <div style={FLD}><label style={LBL}>Technical Skills</label><TagSelect selected={skills.tech} onChange={v=>setSkills(s=>({...s,tech:v}))} options={TECH} placeholder="Search or type (e.g. React, Python, AWS)\u2026" chipBg="#0f2d1a" chipColor="#4ade80" accent="#16a34a"/></div>
        <div style={FLD}><label style={LBL}>Soft Skills</label><TagSelect selected={skills.soft} onChange={v=>setSkills(s=>({...s,soft:v}))} options={SOFT} placeholder="Search or type (e.g. Leadership, Agile)\u2026" chipBg="#1e1a0f" chipColor="#fbbf24" accent="#b45309"/></div>
        <div style={FLD}><label style={LBL}>Languages</label><TagSelect selected={skills.langs} onChange={v=>setSkills(s=>({...s,langs:v}))} options={LANG} placeholder="Search or type with proficiency (e.g. English (Native))\u2026" chipBg="#1a0f2e" chipColor="#c4b5fd" accent="#7c3aed"/><span style={{fontSize:11,color:"#334155",fontFamily:"system-ui",marginTop:4,display:"block"}}>Select with proficiency level, or type a custom entry</span></div>
        <div style={FLD}><label style={LBL}>Certifications <span style={{color:"#334155",fontWeight:400,textTransform:"none",letterSpacing:0}}>(one per line)</span></label><textarea style={{...INP,height:90,resize:"vertical",lineHeight:1.7}} value={skills.certs} onChange={e=>setSkills(s=>({...s,certs:e.target.value}))} placeholder={"AWS Certified Solutions Architect\nGoogle Data Analytics Certificate\nPMP \u2014 Project Management Professional"}/></div>
      </div>);
  };

  /* ── GALLERY VIEW ── */
  if(view==="gallery") return <Gallery onSelect={t=>{setTmpl(t);setStep(0);setAiData(null);setView("form");}}/>;

  /* ── FORM VIEW ── */
  if(view==="form") return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      {/* header */}
      <div style={{background:"rgba(0,0,0,.3)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 28px",display:"flex",alignItems:"center",gap:12,backdropFilter:"blur(12px)"}}>
        <button onClick={()=>setView("gallery")} style={{background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:13,fontFamily:"system-ui",padding:"6px 14px"}}>← Templates</button>
        {tmpl&&<div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:48,borderRadius:4,overflow:"hidden",border:"1px solid #334155",flexShrink:0}}><Thumb t={tmpl}/></div>
          <div><div style={{fontSize:12,fontWeight:700,color:"#e2e8f0",fontFamily:"system-ui"}}>{tmpl.sName}</div><div style={{fontSize:11,color:"#475569",fontFamily:"system-ui"}}>{tmpl.lName} · #{tmpl.num}</div></div>
        </div>}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          {["Personal","Experience","Education","Skills"].map((l,i)=>(
            <span key={i} style={{display:"flex",alignItems:"center",gap:4}}>
              <span onClick={()=>i<=step&&setStep(i)} style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:i===step?"#f59e0b":i<step?"#0f3d21":"#0f172a",border:"2px solid "+(i===step?"#f59e0b":i<step?"#16a34a":"#1e293b"),fontSize:12,cursor:i<=step?"pointer":"default",color:i<step?"#4ade80":"#fff",fontWeight:i<step?700:400}}>{i<step?"✓":STEP_ICONS[i]}</span>
              <span style={{fontSize:11,color:i===step?"#f59e0b":i<step?"#4ade80":"#334155",fontFamily:"system-ui",display:"none"}}>{l}</span>
              {i<3&&<div style={{width:20,height:1.5,background:i<step?"#16a34a":"#1e293b",margin:"0 2px"}}/>}
            </span>))}
        </div>
      </div>
      {/* form card */}
      <div style={{maxWidth:720,margin:"0 auto",padding:"28px 20px 60px"}}>
        <div style={{background:"#111827",borderRadius:16,border:"1px solid rgba(255,255,255,.06)",padding:"30px 34px"}}>
          <div style={{marginBottom:24,paddingBottom:20,borderBottom:"1px solid #0f172a"}}>
            <h2 style={{fontSize:19,fontWeight:700,color:"#f1f5f9",margin:"0 0 5px",fontFamily:"system-ui"}}>{STEP_TITLES[step]}</h2>
            <p style={{fontSize:13,color:"#475569",margin:0,fontFamily:"system-ui"}}>{STEP_SUBS[step]}</p>
          </div>
          {renderStep()}
          {err&&<div style={{background:"#160606",border:"1px solid #450a0a",borderRadius:8,padding:"12px 16px",color:"#f87171",fontSize:13,fontFamily:"system-ui",marginBottom:12}}>{"\u26a0"} {err}</div>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:24,paddingTop:20,borderTop:"1px solid #0f172a"}}>
            <button onClick={()=>step>0?setStep(s=>s-1):setView("gallery")} style={{padding:"10px 22px",background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:14,fontFamily:"system-ui"}}>{step===0?"← Gallery":"← Back"}</button>
            {step<3
              ?<button onClick={()=>setStep(s=>s+1)} style={{padding:"10px 28px",background:"#f59e0b",border:"none",borderRadius:8,color:"#0a0700",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"system-ui"}}>Continue →</button>
              :<button onClick={generate} disabled={loading} style={{padding:"10px 28px",background:loading?"#1e293b":"#f59e0b",border:"none",borderRadius:8,color:loading?"#475569":"#0a0700",fontWeight:700,cursor:loading?"not-allowed":"pointer",fontSize:14,fontFamily:"system-ui",display:"flex",alignItems:"center",gap:10,minWidth:220,justifyContent:"center"}}>
                {loading?<><span style={{display:"inline-block",width:14,height:14,border:"2px solid #475569",borderTop:"2px solid #94a3b8",borderRadius:"50%",animation:"spin .8s linear infinite"}}></span>AI is generating\u2026</>:"\u2728 Generate My Resume"}
              </button>}
          </div>
        </div>
      </div>
    </div>);

  /* ── PREVIEW VIEW ── */
  return(
    <div style={{minHeight:"100vh",background:"#060c1a"}}>
      <div style={{background:"rgba(0,0,0,.3)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 28px",display:"flex",alignItems:"center",gap:12,backdropFilter:"blur(12px)"}}>
        <div style={{width:34,height:34,background:"#f59e0b",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#0a0700"}}>✦</div>
        <div style={{fontSize:14,fontWeight:800,color:"#f8fafc",fontFamily:"system-ui"}}>ResumeAI</div>
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          <button onClick={()=>setView("gallery")} style={{padding:"8px 16px",background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>Change Template</button>
          <button onClick={()=>setView("form")} style={{padding:"8px 16px",background:"transparent",border:"1px solid #1e293b",borderRadius:8,color:"#64748b",cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>✎ Edit Info</button>
          <button onClick={printR} style={{padding:"8px 18px",background:"#f59e0b",border:"none",borderRadius:8,color:"#0a0700",fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"system-ui"}}>{"\u2193"} Download PDF</button>
        </div>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"28px 20px 60px"}}>
        <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:700,color:"#f1f5f9",margin:"0 0 3px",fontFamily:"system-ui"}}>🎉 Your Resume is Ready!</h2>
            <p style={{fontSize:12,color:"#475569",margin:0,fontFamily:"system-ui"}}>Template #{tmpl?.num} · {tmpl?.sName} · {tmpl?.lName}</p>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 20px 60px rgba(0,0,0,.6)",marginBottom:20,overflow:"hidden"}}>
          <RView tmpl={tmpl} personal={P} exps={exps} edus={edus} skills={skills} aiData={aiData} photo={photo} rRef={rRef}/>
        </div>
        <div style={{background:"#05140b",border:"1px solid #052e16",borderRadius:10,padding:"14px 18px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:8,fontFamily:"system-ui"}}>✓ Your resume has been optimised for maximum interview success</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 22px"}}>
            {["Dates auto-formatted (Dec 2024 – Apr 2026)","Job titles & company names in Title Case","Achievement-focused bullets with action verbs & metrics","Professional summary tailored to your target role","ATS-optimised — passes Fortune 500 applicant tracking","Download PDF → Print to PDF → save as YourName_Resume.pdf"].map((t,i)=>(
              <div key={i} style={{fontSize:11,color:"#86efac",fontFamily:"system-ui",lineHeight:1.7,display:"flex",gap:7}}><span style={{color:"#4ade80",flexShrink:0}}>{"\u2192"}</span>{t}</div>))}
          </div>
        </div>
      </div>
    </div>);
}

document.getElementById("splash").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
